spring.application.name=book-management

# Oracle bağlantısı
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:BOOK_APP}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:BookApp_2026}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=8080