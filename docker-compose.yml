services:
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: book-oracle-db
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/setup:/opt/oracle/scripts/setup:ro
    networks:
      - book-network
    restart: unless-stopped

  book-application:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-application
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - book-network
    restart: on-failure

volumes:
  oracle-data:
    name: book-oracle-data

networks:
  book-network:
    name: book-network
    driver: bridge
